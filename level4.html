<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 4 - Happy Birthday!</title>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        @font-face {
            font-family: 'Zpix';
            src: url('./zpix.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Zpix', sans-serif;
            color: #fff;
            overflow: hidden;
            transition: background-color 1.5s ease;
        }

        body.lights-out {
            background-color: #000;
        }

        .title {
            font-size: 2rem;
            text-align: center;
            text-shadow: 0 4px 0 #e94560;
            margin-bottom: 10px;
            z-index: 10;
            transition: opacity 1s;
        }

        .subtitle {
            font-family: 'Zpix', sans-serif;
            font-size: 1.5rem;
            color: #a2a2bd;
            margin-bottom: 40px;
            animation: blink 1.5s infinite;
            z-index: 10;
            transition: opacity 1s;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 3D 容器 */
        #three-canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5;
            cursor: pointer;
        }

        /* 情书卷轴 */
        .letter-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -40%);
            width: 85%;
            max-width: 500px;
            background-color: #f4ecd8;
            padding: 30px;
            border: 6px solid #fff;
            border-radius: 10px;
            color: #333;
            font-family: 'Zpix', sans-serif;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            transition: opacity 2s ease, transform 2s ease;
            z-index: 20;
            cursor: pointer;
        }

        .letter-container.show {
            opacity: 1;
            transform: translate(-50%, -50%);
            pointer-events: auto;
        }

        .letter-title {
            font-size: 1.8rem;
            color: #e94560;
            text-align: center;
            border-bottom: 4px dashed #ccc;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .letter-content {
            font-size: 1.2rem;
            line-height: 1.8;
            min-height: 250px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .letter-text {
            white-space: pre-wrap;
            transition: opacity 0.5s ease;
        }

        .click-hint {
            font-size: 1rem;
            color: #e94560;
            text-align: right;
            margin-top: 20px;
            animation: blink 1.5s infinite;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            top: -10px;
            z-index: 15;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        /* ==========================================
           移动端自适应优化 (屏幕宽度 <= 768px)
        ========================================== */
        @media (max-width: 768px) {
            /* 1. 顶部标题微调 */
            .title {
                font-size: 1.6rem; 
                margin-top: 20px;
            }
            .subtitle {
                font-size: 1rem;
                margin-bottom: 20px;
            }

            /* 2. 优化情书容器空间 */
            .letter-container {
                width: 90%; /* 充分利用手机宽度 */
                padding: 20px 15px; /* 减小内边距，给文字腾出空间 */
            }

            .letter-title {
                font-size: 1.4rem; /* 缩小信件标题 */
                margin-bottom: 15px;
                padding-bottom: 10px;
            }

            /* 3. 优化长文本阅读体验 */
            .letter-content {
                font-size: 1rem; /* 调整正文字号 */
                line-height: 1.7; /* 适当紧凑一点行高 */
                /* 关键：因为手机屏幕窄，文字换行变多，增加容器高度防止被截断，
                   也防止不同页数长短不一导致框体高度剧烈跳动 */
                min-height: 380px; 
            }

            .click-hint {
                font-size: 0.9rem;
                margin-top: 15px;
            }
        }

    </style>
</head>
<body>

    <h1 class="title" id="main-title">HAPPY BIRTHDAY</h1>
    <p class="subtitle" id="sub-title">点击蜡烛火焰，许个愿吧！</p>

    <div id="three-canvas-container"></div>

    <div class="letter-container" id="letter">
        <div class="letter-title">To: 亲爱的林先生</div>
        <div class="letter-content">
            <div class="letter-text" id="letter-text"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        /* ========================================================
           1. THREE.JS 3D 蛋糕渲染部分 (边界清晰优化版)
        ======================================================== */
        const container = document.getElementById('three-canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 6, 15);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        // --- 移动端防误触优化 ---
        controls.enablePan = false;  // 禁止单指/双指平移位置（防止蛋糕被拖出屏幕）
        controls.enableZoom = false; // 禁止双指缩放（防止镜头穿模）

        const colorPalette = [
            new THREE.Color('#0f3460'),
            new THREE.Color('#e94560'),
            new THREE.Color('#3a506b')
        ];
        const flamePalette = [
            new THREE.Color('#f9a826'),
            new THREE.Color('#ffcc00')
        ];

        const cakePositions = [];
        const cakeColors = [];
        const flamePositions = [];
        const flameColors = [];

        // 🌟 核心修改点：强化边界感
        function addSparseCylinderParticles(count, radius, height, baseY, palette, isCandle = false) {
            for (let i = 0; i < count; i++) {
                let r;
                
                // 30% 的粒子强制生成在最外侧圆环上，形成清晰的边界感（“蛋壳”效应）
                if (Math.random() < 0.3 && !isCandle) {
                    r = radius; 
                } else {
                    // 其余 70% 的粒子在内部散布（中心略密，边缘略疏）
                    r = Math.pow(Math.random(), 0.6) * radius; 
                }

                const theta = Math.random() * Math.PI * 2;
                
                // 严格限制 X 和 Z，不再添加噪点溢出边界
                const x = r * Math.cos(theta);
                const z = r * Math.sin(theta);
                
                // 保留 Y 轴（高度）的微小噪点，让上下两面有星尘感
                const noiseY = (Math.random() - 0.5) * 0.5;
                const y = baseY + Math.random() * height + noiseY;

                cakePositions.push(x, y, z);

                let col;
                if (isCandle) {
                    col = new THREE.Color('#f4ecd8'); 
                } else {
                    col = palette[Math.floor(Math.random() * palette.length)].clone();
                    if (Math.random() > 0.7) col.multiplyScalar(0.5); 
                }
                cakeColors.push(col.r, col.g, col.b);
            }
        }

        // --- 构建双层稀疏蛋糕 ---
        addSparseCylinderParticles(3500, 6, 4, -2, colorPalette);
        addSparseCylinderParticles(2500, 4, 3, 2, colorPalette);

        // --- 构建 6 根蜡烛与火苗 ---
        const numCandles = 6;
        const candleRadius = 2.5; 
        for (let i = 0; i < numCandles; i++) {
            const angle = (i / numCandles) * Math.PI * 2;
            const cx = candleRadius * Math.cos(angle);
            const cz = candleRadius * Math.sin(angle);
            
            for (let j = 0; j < 80; j++) {
                const cr = Math.random() * 0.2; 
                const cTheta = Math.random() * Math.PI * 2;
                const px = cx + cr * Math.cos(cTheta);
                const pz = cz + cr * Math.sin(cTheta);
                const py = 5 + Math.random() * 2; 
                cakePositions.push(px, py, pz);
                cakeColors.push(1, 1, 1); 
            }

            for (let j = 0; j < 50; j++) {
                const fr = Math.pow(Math.random(), 0.5) * 0.4; 
                const fTheta = Math.random() * Math.PI * 2;
                const fPhi = Math.acos(2 * Math.random() - 1);
                
                const px = cx + fr * Math.sin(fPhi) * Math.cos(fTheta);
                const py = 7.3 + fr * Math.cos(fPhi) * 1.5; 
                const pz = cz + fr * Math.sin(fPhi) * Math.sin(fTheta);
                
                flamePositions.push(px, py, pz);
                const col = flamePalette[Math.floor(Math.random() * flamePalette.length)];
                flameColors.push(col.r, col.g, col.b);
            }
        }

        const cakeGeo = new THREE.BufferGeometry();
        cakeGeo.setAttribute('position', new THREE.Float32BufferAttribute(cakePositions, 3));
        cakeGeo.setAttribute('color', new THREE.Float32BufferAttribute(cakeColors, 3));
        const cakeMat = new THREE.PointsMaterial({ 
            size: 0.08, 
            vertexColors: true, 
            transparent: true, 
            opacity: 0.6, 
            blending: THREE.AdditiveBlending, 
            depthWrite: false 
        });
        const cakeSystem = new THREE.Points(cakeGeo, cakeMat);
        scene.add(cakeSystem);

        const flameGeo = new THREE.BufferGeometry();
        flameGeo.setAttribute('position', new THREE.Float32BufferAttribute(flamePositions, 3));
        flameGeo.setAttribute('color', new THREE.Float32BufferAttribute(flameColors, 3));
        const flameMat = new THREE.PointsMaterial({ 
            size: 0.12, 
            vertexColors: true, 
            transparent: true, 
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const flameSystem = new THREE.Points(flameGeo, flameMat);
        scene.add(flameSystem);

        const hitboxGeo = new THREE.CylinderGeometry(4, 4, 3, 16);
        const hitboxMat = new THREE.MeshBasicMaterial({ visible: false }); 
        const hitbox = new THREE.Mesh(hitboxGeo, hitboxMat);
        hitbox.position.y = 6.5; 
        scene.add(hitbox);

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            time += 0.01; 

            const floatY = Math.sin(time * 2) * 0.3; 
            cakeSystem.position.y = floatY;
            hitbox.position.y = 6.5 + floatY;

            flameSystem.position.y = floatY;
            flameSystem.scale.x = 1 + Math.sin(time * 5) * 0.05; 
            flameSystem.scale.y = 1 + Math.sin(time * 3) * 0.08; 
            flameSystem.scale.z = 1 + Math.sin(time * 5) * 0.05;
            
            flameMat.opacity = 0.7 + Math.sin(time * 8) * 0.2; 

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        /* ========================================================
           2. 交互逻辑与情书弹窗部分
        ======================================================== */
        const body = document.body;
        const mainTitle = document.getElementById('main-title');
        const subTitle = document.getElementById('sub-title');
        const letter = document.getElementById('letter');
        const letterTextElement = document.getElementById('letter-text');

        let isBlownOut = false;
        let isLetterShown = false;
        let currentPageIndex = 0;
        let isFlipping = false;

        const letterPages = [
            `见字如晤。\n如你所见，这是一封告白信。从我们在一起的那天、得知你生日的那天，其实我就在构思送你一份什么样的生日礼物，甚至还简单地规划了一部分未来的惊喜。但，反复斟酌了许久，还是在你生日的前一周敲下了这一段看似“流水账”的文字。`,
            `我们的相识其实很简单，但我应该没有跟你说过，我当时给你发送那一条私信也纠结了很久。那天下午纯属是忙里偷闲，然后疯狂做积极的心理暗示，最后才下定决心点击了发送键。毕竟，以我对自己的了解，我并不喜欢这种不定性的事件。但我也很庆幸自己当时做出了这样的决定，在冥冥之中，让我们的相识变成了我们相爱的伏笔。`,
            `那说到爱，什么才算是“爱”？我的个人观点看来，这是一个伪命题，因为“是否爱”取决于个体的主观能动性以及情感体验。据此可以说明，对于“爱”的定义，我们可以共同去撰写，慢慢地用我们的点滴经验去填充这个本就空无一物的洞穴。我想在这个过程中，我们会共同见证高山低谷，也会遇见不同十字路口，但无论好坏，这份独属于我们的“爱”，都是绚烂的。`,
            `说到我写这封信的初心，是希望你可以短暂地丢却科研的烦恼，带着一丝愉悦的心情去感受这份心意。同时，也希望你在读到这段话时，能够意识到，现在你的身边有人在陪你、等你、担心你，你也不再是一个人经历这段漫长而又枯燥的博士生活，现在有人慢慢地跟在你身后啦~`,
            `其次，我不确定你会不会跟亲人倾诉烦恼，但如果你愿意，我也很乐意听你说~因为我们的学科交叉可能性不大，我能为你提供的帮助少之又少，在看到你因为实验进展、专业论文、科研工作积压等问题烦恼的时候，我其实也有过手足无措的感觉，因为帮不上你，会着急、会心疼。`,
            `因此，从我个人的角度出发，以下是我折中的解决办法：\n一、努力提升自己。因为我的林先生还在努力向前走，那我自然不能停下脚步呀。`,
            `二、虽然不是小太阳，但努力成为你的小太阳。我猜猜看~我猜你应该没发现我其实不是一个分享欲很高的人（笑），但因为是你，于是就打开了“话痨”模式。有研究表明，工作强度和焦虑情绪呈正相关哦~`,
            `所以我不希望你的一整天都充满了高强度的科研气息，这样容易产生情绪问题。简言之，我希望的是，你在短暂的休息下，打开手机，能看到我胡说八道的信息，然后心里是一阵轻松的。（当然，这有很长一段路要走，但希望未来的我们天下第一好~）\n三、保护好自己，不让你担心。这个我就不解释啦！`,
            `写到这里，我按下暂停键已经有一个小时了吧？正如我前面所说，这是一封告白信，但又不像是告白信，感觉更像是我在剖析自己对你的感情。在前文提到过，我不喜欢不定性的未来事件，所以在一件事开始前，我就会去设想5、6、7、8个结局，因为比起过程，我会更看重结果（这能让自己不陷入一个被动局面）。`,
            `但是呢！跟你在一起之后，我想，体验当下也很好，然后再慢慢和你一起规划未来。虽然未知很可怕，但起码现在，我们陪伴在彼此的身边。`,
            `最后，用这句话共勉“The best way to predict the future is to invent it.（预测未来最好的办法就是创造未来）” 如果用游戏闯关来比喻未知的未来，那么我们就一起找到解谜的答案。祝我聪明踏实的男朋友、我未来的林先生科研顺利、生日快乐！`
        ];

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        container.addEventListener('pointerdown', (event) => {
            if (isBlownOut) return; 

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObject(hitbox);

            if (intersects.length > 0) {
                isBlownOut = true;
                
                flameSystem.visible = false;
                scene.remove(hitbox); 

                body.classList.add('lights-out');
                
                mainTitle.style.opacity = '0';
                subTitle.style.opacity = '0';

                setTimeout(() => {
                    mainTitle.style.display = 'none';
                    subTitle.style.display = 'none';
                    
                    cakeMat.opacity = 0.1; 

                    body.classList.remove('lights-out');
                    updateLetterPage();
                    letter.classList.add('show');
                    startConfetti();
                    isLetterShown = true;
                }, 1500);
            }
        });

        // 点击情书翻页
        letter.addEventListener('pointerdown', () => {
            if (!isLetterShown || isFlipping) return;

            // 如果还没到最后一页，就执行翻页动画
            if (currentPageIndex < letterPages.length - 1) {
                isFlipping = true;
                letterTextElement.style.opacity = '0'; 
                setTimeout(() => {
                    currentPageIndex++;
                    updateLetterPage();
                    letterTextElement.style.opacity = '1'; 
                    setTimeout(() => { isFlipping = false; }, 500);
                }, 500); 
            }
            // 🌟 核心修改：删除了 else 分支。
            // 意味着如果到了最后一页，再次点击屏幕，系统什么都不会做，画面将永远定格在这里。
        });

        function updateLetterPage() {
            let hintHtml = '';
            if (currentPageIndex < letterPages.length - 1) {
                hintHtml = `<div class="click-hint">▼ 点击继续阅读</div>`;
            } else {
                // 🌟 核心修改：将最后一页的提示改成纯粹的爱意表达
                hintHtml = `<div class="click-hint">❤</div>`; 
            }
            letterTextElement.innerHTML = letterPages[currentPageIndex] + hintHtml;
        }

        function startConfetti() {
            const colors = ['#e94560', '#0f3460', '#f9a826', '#4caf50', '#00d2ff'];
            setInterval(() => {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = confetti.style.width;
                const duration = Math.random() * 3 + 2; 
                confetti.style.animationDuration = duration + 's';
                body.appendChild(confetti);
                setTimeout(() => { confetti.remove(); }, duration * 1000);
            }, 100);
        }
    </script>
</body>
</html>
