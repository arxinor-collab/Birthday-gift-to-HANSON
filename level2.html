<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, touch-action=none">
    <title>专属电波连接</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
    <style>
        /* 引入本地中文像素字体 Zpix */
        @font-face {
            font-family: 'Zpix';
            src: url('./zpix.ttf') format('truetype');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ========================================== */
        /* 全新：炫彩科技风背景 */
        /* ========================================== */
        body {
            /* 使用多色渐变：深紫、午夜蓝、暗青色交织 */
            background: linear-gradient(45deg, #100b21, #251042, #111a3b, #0b252a);
            background-size: 400% 400%;
            /* 背景流动动画 */
            animation: gradientBG 15s ease infinite;
            
            color: #ffffff;
            font-family: 'Zpix', 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            position: relative; /* 为科技网格做准备 */
        }

        /* 背景流动的关键帧动画 */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 增加一层全屏的“科技感发光网格”叠加在背景上 */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.08) 1px, transparent 1px);
            background-size: 40px 40px; /* 网格的大小 */
            z-index: -1; /* 保证网格在最底层，不会遮挡文字和互动元素 */
            pointer-events: none;
            /* 加上一点透视感，让网格看起来更有深度 */
            transform: perspective(500px) rotateX(10deg) scale(1.2);
            transform-origin: bottom;
        }
        /* ========================================== */

        /* 顶部计时器区域 */
        .timer-container {
            text-align: center;
            margin-bottom: 80px;
            font-size: 2rem;
            line-height: 2.5;
            text-shadow: 3px 3px 0px #000, 0 0 15px rgba(0, 255, 204, 0.3); /* 字体增加霓虹发光感 */
        }

        .highlight {
            color: #ff4757; 
            font-size: 3.5rem;
            text-shadow: 4px 4px 0px #000, 0 0 20px rgba(255, 71, 87, 0.5); /* 数字的霓虹发光感 */
        }

        /* 底部互动区域 */
        .interaction-area {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 800px;
            margin-bottom: 60px;
        }

        /* 圆形头像与水波纹 */
        .avatar-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 120px;
            height: 120px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover; 
            z-index: 2;
            transition: transform 0.2s;
            image-rendering: pixelated;
            border: 4px solid #ffffff;
            box-shadow: 4px 4px 0px #000;
        }

        .ripple {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%; 
            border: 2px solid #00ffcc; 
            opacity: 0;
            z-index: 1; 
            pointer-events: none; 
        }

        /* 能量进度条样式 */
        .progress-track {
            flex-grow: 1;
            height: 24px;
            margin: 0 30px;
            background-color: rgba(0, 0, 0, 0.5); /* 半透明底色更能融入背景 */
            border: 4px solid #fff;
            box-shadow: 4px 4px 0px #000;
            position: relative;
            backdrop-filter: blur(5px); /* 给进度条增加磨砂玻璃质感 */
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
            transition: width 0.1s linear;
        }

        /* 提示文字按钮 */
        .instruction {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            animation: pulse 1.5s infinite;
            cursor: pointer;
            padding: 20px 40px;
            border: 4px dashed rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background-color: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; color: #00ffcc; border-color: #00ffcc; transform: scale(1.05); text-shadow: 0 0 10px #00ffcc; }
            100% { opacity: 0.7; transform: scale(1); }
        }

        /* ==========================================
           移动端自适应优化 (屏幕宽度 <= 768px)
        ========================================== */
        @media (max-width: 768px) {
            /* 1. 优化顶部倒计时，防止折行 */
            .timer-container {
                font-size: 1.2rem;
                margin-bottom: 50px;
                line-height: 2;
            }
            .highlight {
                font-size: 2rem; /* 从 3.5rem 缩小，保证能在一行内显示 */
            }

            /* 2. 优化互动区域，给进度条留出呼吸空间 */
            .interaction-area {
                width: 95%; /* 稍微放宽屏幕占比 */
                margin-bottom: 40px;
            }
            .avatar-wrapper {
                width: 80px;  /* 缩小头像尺寸 */
                height: 80px;
            }
            .ripple {
                width: 80px; /* 同步缩小水波纹的基础尺寸 */
                height: 80px;
            }
            .progress-track {
                margin: 0 15px; /* 减小进度条两端的边距 */
                height: 20px;   /* 稍微调细一点进度条 */
            }

            /* 3. 优化底部按钮提示 */
            .instruction {
                font-size: 1rem; /* 缩小提示文字 */
                padding: 15px 20px; /* 减小按钮的内边距 */
            }
        }


    </style>
</head>
<body>

    <div class="timer-container">
        我们的专属电波已联结<br>
        <span id="days" class="highlight">0</span> 天 
        <span id="hours" class="highlight">0</span> 小时 
        <span id="mins" class="highlight">0</span> 分 
        <span id="secs" class="highlight">0</span> 秒
    </div>

    <div class="interaction-area">
        <div class="avatar-wrapper" id="boyWrapper">
            <img class="avatar" id="avatar1" src="./boy.png" alt="男主角">
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
        </div>
        
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="avatar-wrapper" id="girlWrapper">
            <img class="avatar" id="avatar2" src="./girl.png" alt="女主角">
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
        </div>
    </div>

    <div class="instruction" id="chargeBtn">
        [ 按住屏幕 蓄力发送专属电波 ]
    </div>

    <script>
        // ==========================================
        // 1. 计时器逻辑 (记得改时间！)
        // ==========================================
        const startDate = new Date('2026-03-14T00:00:00').getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days;
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('mins').innerText = mins.toString().padStart(2, '0');
            document.getElementById('secs').innerText = secs.toString().padStart(2, '0');
        }

        setInterval(updateTimer, 1000);
        updateTimer(); 

        // ==========================================
        // 2. 长按蓄力与水波纹逻辑
        // ==========================================
        const chargeBtn = document.getElementById('chargeBtn');
        const progressFill = document.getElementById('progressFill');
        const avatar1 = document.getElementById('avatar1');
        const avatar2 = document.getElementById('avatar2');

        let chargeLevel = 0;
        let chargingInterval;
        let isCharging = false;

        function createRippleAnimation(targetWrapperId) {
            const ripples = document.querySelectorAll(`${targetWrapperId} .ripple`);
            return anime({
                targets: ripples,
                scale: [1, 2.5], /* 扩散得更大一点 */
                opacity: [0.8, 0],
                duration: 2000,
                easing: 'easeOutQuart',
                loop: true,
                delay: anime.stagger(500),
                autoplay: false
            });
        }

        const boyRippleAnim = createRippleAnimation('#boyWrapper');
        const girlRippleAnim = createRippleAnimation('#girlWrapper');

        function triggerNextLevel() {
            window.location.href = "./level3.html";
            chargeLevel = 0; 
            updateProgressVisuals();
        }

        function updateProgressVisuals() {
            progressFill.style.width = chargeLevel + '%';
            
            if (chargeLevel > 80) {
                progressFill.style.backgroundColor = "#ff4757";
                progressFill.style.boxShadow = "0 0 30px #ff4757";
            } else {
                progressFill.style.backgroundColor = "#00ffcc";
                progressFill.style.boxShadow = "0 0 20px #00ffcc";
            }

            const ripples = document.querySelectorAll('.ripple');
            const hslBright = chargeLevel; 
            ripples.forEach(ripple => {
                ripple.style.borderColor = `hsl(160, 100%, ${50 + hslBright/2}%)`;
                ripple.style.boxShadow = `0 0 ${chargeLevel/8}px hsl(160, 100%, ${50 + hslBright/2}%)`;
            });

            const shake = chargeLevel > 50 ? (Math.random() * 4 - 2) : 0;
            avatar1.style.transform = `translateY(${shake}px) scale(${1 + chargeLevel/400})`;
            avatar2.style.transform = `translateY(${shake}px) scale(${1 + chargeLevel/400})`;
        }

        function startCharging(e) {
            e.preventDefault(); 
            if (isCharging) return;
            isCharging = true;
            chargeBtn.innerText = "⚡ 正在注入爱意... ⚡";
            chargeBtn.style.color = "#00ffcc";
            chargeBtn.style.borderColor = "#00ffcc";

            boyRippleAnim.play();
            girlRippleAnim.play();

            chargingInterval = setInterval(() => {
                if (chargeLevel < 100) {
                    chargeLevel += 2; 
                    updateProgressVisuals();
                } else {
                    clearInterval(chargingInterval);
                    isCharging = false;
                    chargeBtn.innerText = "✨ 发送成功！ ✨";
                    triggerNextLevel();
                }
            }, 50); 
        }

        function stopCharging() {
            if (!isCharging) return;
            clearInterval(chargingInterval);
            isCharging = false;
            
            boyRippleAnim.pause();
            girlRippleAnim.pause();

            const decayInterval = setInterval(() => {
                if (chargeLevel > 0 && !isCharging) {
                    chargeLevel -= 3;
                    if(chargeLevel < 0) chargeLevel = 0;
                    updateProgressVisuals();
                } else {
                    clearInterval(decayInterval);
                }
            }, 20);

            chargeBtn.innerText = "[ 按住屏幕 蓄力发送专属电波 ]";
            chargeBtn.style.color = "rgba(255, 255, 255, 0.6)";
            chargeBtn.style.borderColor = "rgba(255, 255, 255, 0.3)";
        }

        chargeBtn.addEventListener('pointerdown', startCharging);
        window.addEventListener('pointerup', stopCharging); 
    </script>
</body>
</html>
